<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Red diamond border -->
  <polygon points="100,5 195,100 100,195 5,100" fill="white" stroke="#FF1100" stroke-width="7"/>
  <!-- Gas Cylinder -->
  <g fill="#000000">
    <!-- Cylinder body -->
    <rect x="72" y="60" width="56" height="90" rx="8" ry="8"/>
    <!-- Cylinder top dome -->
    <ellipse cx="100" cy="60" rx="28" ry="10"/>
    <!-- Cylinder bottom dome -->
    <ellipse cx="100" cy="150" rx="28" ry="10"/>
    <!-- Valve/neck -->
    <rect x="92" y="42" width="16" height="18" rx="3"/>
    <!-- Valve top -->
    <rect x="88" y="38" width="24" height="6" rx="2"/>
    <!-- Valve wheel/handle -->
    <rect x="85" y="33" width="30" height="6" rx="3"/>
    <!-- Highlight stripe on cylinder for 3D effect -->
    <rect x="82" y="62" width="8" height="86" rx="2" fill="white" opacity="0.2"/>
    <!-- Foot/base -->
    <rect x="74" y="152" width="52" height="6" rx="2"/>
  </g>
</svg>
