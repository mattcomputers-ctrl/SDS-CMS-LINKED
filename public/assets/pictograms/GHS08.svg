<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- GHS08: Health Hazard — red diamond with human silhouette and starburst on chest -->
  <polygon points="100,5 195,100 100,195 5,100" fill="white" stroke="#FF1100" stroke-width="7"/>
  <g fill="#000000">
    <!-- Head -->
    <circle cx="100" cy="45" r="14"/>
    <!-- Torso -->
    <path d="M 82,60 L 118,60 L 122,118 L 78,118 Z"/>
    <!-- Left arm -->
    <path d="M 82,62 L 56,90 L 50,84 L 72,60 Z"/>
    <!-- Right arm -->
    <path d="M 118,62 L 144,90 L 150,84 L 128,60 Z"/>
    <!-- Left leg -->
    <path d="M 78,118 L 70,164 L 82,164 L 88,118 Z"/>
    <!-- Right leg -->
    <path d="M 122,118 L 130,164 L 118,164 L 112,118 Z"/>
  </g>
  <!-- Starburst on chest (white cutout) — irregular pointed star representing health hazard -->
  <path fill="white" d="
    M 100,68
    L 103,74 L 110,72 L 106,78
    L 112,82 L 105,83 L 106,90
    L 100,86 L 94,90 L 95,83
    L 88,82 L 94,78 L 90,72
    L 97,74 Z
  "/>
</svg>
