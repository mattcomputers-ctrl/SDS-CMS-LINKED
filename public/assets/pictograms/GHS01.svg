<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Red diamond border -->
  <polygon points="100,5 195,100 100,195 5,100" fill="white" stroke="#FF1100" stroke-width="7"/>
  <!-- Exploding Bomb -->
  <g transform="translate(100,105)" fill="#000000">
    <!-- Bomb body (circle) -->
    <circle cx="0" cy="10" r="22"/>
    <!-- Fuse -->
    <rect x="-3" y="-18" width="6" height="12" rx="1"/>
    <!-- Fuse curve/spark -->
    <path d="M0,-18 Q8,-28 3,-35" stroke="#000000" stroke-width="3" fill="none"/>
    <!-- Explosion spikes -->
    <polygon points="0,-38 -4,-30 4,-30" />
    <polygon points="8,-36 4,-28 10,-27" />
    <polygon points="-8,-36 -4,-28 -10,-27" />
    <!-- Explosion rays from bomb -->
    <line x1="22" y1="0" x2="42" y2="-10" stroke="#000000" stroke-width="4"/>
    <line x1="20" y1="-12" x2="38" y2="-25" stroke="#000000" stroke-width="4"/>
    <line x1="15" y1="-18" x2="28" y2="-38" stroke="#000000" stroke-width="4"/>
    <line x1="-22" y1="0" x2="-42" y2="-10" stroke="#000000" stroke-width="4"/>
    <line x1="-20" y1="-12" x2="-38" y2="-25" stroke="#000000" stroke-width="4"/>
    <line x1="-15" y1="-18" x2="-28" y2="-38" stroke="#000000" stroke-width="4"/>
    <line x1="10" y1="-20" x2="15" y2="-42" stroke="#000000" stroke-width="4"/>
    <line x1="-10" y1="-20" x2="-15" y2="-42" stroke="#000000" stroke-width="4"/>
    <!-- Fragment pieces at ray tips -->
    <circle cx="44" cy="-11" r="3"/>
    <circle cx="40" cy="-27" r="3"/>
    <circle cx="30" cy="-40" r="3"/>
    <circle cx="-44" cy="-11" r="3"/>
    <circle cx="-40" cy="-27" r="3"/>
    <circle cx="-30" cy="-40" r="3"/>
    <circle cx="16" cy="-44" r="3"/>
    <circle cx="-16" cy="-44" r="3"/>
  </g>
</svg>
